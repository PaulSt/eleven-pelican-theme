{% extends "base.html" %}

{% block content %}
<main class="page-content" aria-label="Content">
  <div class="w">
    {% if article.prev_article_in_category %}
      <a href="{{ SITEURL }}/{{ article.prev_article_in_category.url }}">&lt;</a>
    {% else %}
      &nbsp;
    {% endif %}

    <a href="{{ SITEURL }}/">^</a>

    {% if article.next_article_in_category %}
      <a href="{{ SITEURL }}/{{ article.next_article_in_category.url }}">&gt;</a>
    {% endif %}
  </div>

  <div class="box">
    <h1>{{ article.title }}</h1>
    {{ article.content }}
  </div>
</main>
{% endblock %}
